# Stage1-v2 2026-04-23 OOD eval-only preset.
# The manifest is smoke/diagnostic quality and must not enter paper-stage training.

manifest: output/material_refine_paper/stage1_v2_dataset_20260423/stage1_v2_ood_eval_manifest.json
checkpoint: output/material_refine_paper/stage1_round9_conservative_boundary/best.pt
output_dir: output/material_refine_paper/stage1_round9_conservative_boundary_eval_ood_v2

split: test
split_strategy: manifest
batch_size: 1
num_workers: 4
view_sample_count: 8
min_hard_views: 0
log_every: 10
cuda_device_index: 1
max_samples: 128

eval_variant: ood_eval
render_metric_mode: proxy_uv_shading
max_artifact_objects: 16
enable_lpips: false
diagnostic_min_group_count: 8
skip_report: false
print_summary_json: false

report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_run_name: material-refine-stage1-v2-20260423-ood-round9-conservative
tracker_group: paper-stage1-diagnostic
tracker_tags: material-refine,stage1-v2,ood-eval,round9,conservative-boundary
wandb_mode: online
wandb_max_rows: 128
wandb_log_top_cases: false
wandb_log_group_breakdowns: true
wandb_log_artifacts: true
wandb_artifact_policy: summary
