# Round9 boundary-band ablation matrix.
# Use this as the source of truth for small-scale validation before any full Round9 run.

base_config: configs/material_refine_train_paper_stage1_round9_boundary_render_gate.yaml
default_smoke_overrides:
  epochs: 3
  max_train_steps: 45
  max_train_records: 96
  max_val_records: 40
  report_to: wandb
  tracker_group: paper-stage1-round9-boundary-ablation
  wandb_artifact_policy: best
  save_only_best_checkpoint: true

selection_rule:
  primary: minimize validation uv_total without regressing render_proxy/view_rm_mae_delta
  secondary: minimize val/loss/boundary_bleed and val/residual_gate/regression_rate
  note: full training is allowed only after Round8 full eval and this smoke matrix have both been reviewed

variants:
  - name: boundary_w005_k5
    boundary_bleed_weight: 0.05
    boundary_band_kernel: 5
    output_dir: output/material_refine_paper/round9_boundary_ablation/boundary_w005_k5
    tracker_run_name: material-refine-round9-boundary-w005-k5
  - name: boundary_w005_k7
    boundary_bleed_weight: 0.05
    boundary_band_kernel: 7
    output_dir: output/material_refine_paper/round9_boundary_ablation/boundary_w005_k7
    tracker_run_name: material-refine-round9-boundary-w005-k7
