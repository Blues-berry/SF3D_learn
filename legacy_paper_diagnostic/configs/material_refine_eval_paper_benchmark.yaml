# Paper benchmark evaluation preset.
#
# Run once per checkpoint and optionally override `--generator-ids` to create
# per-upstream tables: sf3d, spar3d, hunyuan3d, or other canonical generators.

manifest: output/material_refine_paper/paper_stage1_pipeline/readiness/stage1_subset/paper_stage1_subset_manifest.json
split: test
split_strategy: manifest
hash_val_ratio: 0.10
hash_test_ratio: 0.10

generator_ids: null
source_names: null
supervision_tiers: null
supervision_roles: paper_main
license_buckets: null
target_quality_tiers: paper_strong,paper_pseudo
paper_splits: paper_test_iid,paper_test_material_holdout,paper_test_real_lighting
require_prior: any

batch_size: 1
num_workers: 4
cuda_device_index: 0
max_samples: null
skip_report: false

output_dir: output/material_refine_paper/eval_main_test
report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_run_name: material-refine-paper-main-test
tracker_group: paper-stage1
tracker_tags: material-refine,paper,benchmark,cross-generator
wandb_mode: online
wandb_max_rows: 256
wandb_log_artifacts: true
