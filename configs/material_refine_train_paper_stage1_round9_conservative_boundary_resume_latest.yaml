# Resume-only override for the Round9 conservative boundary run.
# Use together with material_refine_train_paper_stage1_round9_conservative_boundary.yaml.
# The base config uses model-only init_from_checkpoint; this override disables that
# and resumes optimizer/scheduler/scaler state from the latest saved best checkpoint.

init_from_checkpoint:
resume: output/material_refine_paper/stage1_round9_conservative_boundary/latest.pt

tracker_run_name: material-refine-paper-stage1-round9-conservative-boundary-resume
tracker_tags: material-refine,paper-stage1,round9,conservative-boundary,resume
wandb_resume_mode: allow

# Resume runs should leave a fresh latest checkpoint even when validation does
# not improve, otherwise an external cleanup can force us back to the old best.
save_only_best_checkpoint: false
save_every: 1
keep_last_checkpoints: 4
wandb_log_artifacts: true
wandb_artifact_policy: summary
