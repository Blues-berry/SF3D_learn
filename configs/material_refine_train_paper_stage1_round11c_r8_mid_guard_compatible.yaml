# Round11c / shape-compatible medium guard overlay.
#
# Prepared as the next candidate if Round11b proves too conservative.
# It keeps the Round10-compatible architecture but relaxes residual caps and
# boundary suppression to recover UV/view accuracy while still targeting the
# Round10 boundary/gradient/render regressions.

output_dir: output/material_refine_paper/stage1_round11c_r8_mid_guard_compatible
init_from_checkpoint: output/material_refine_paper/stage1_round10_r8_full/best.pt
resume:

epochs: 14
learning_rate: 2.5e-5
min_learning_rate: 2.5e-6
warmup_steps: 80
plateau_patience: 3
early_stopping_patience: 5

residual_gate_bias: -1.45
min_residual_gate: 0.015
max_residual_gate: 0.72
prior_confidence_gate_strength: 0.58
uncertainty_gate_strength: 0.25

enable_boundary_safety_module: true
boundary_safety_strength: 0.45
boundary_residual_suppression_strength: 0.28

enable_material_topology_reasoning: true
topology_feature_channels: 16
topology_patch_size: 16
topology_layers: 2
topology_heads: 2

enable_render_consistency_gate: false
render_gate_strength: 0.0
enable_inverse_material_check: true
inverse_check_strength: 0.32

refine_weight: 0.74
coarse_weight: 0.28
prior_consistency_weight: 0.18
smoothness_weight: 1.0e-3
view_consistency_weight: 0.38
edge_aware_weight: 0.16
boundary_bleed_weight: 0.14
boundary_band_kernel: 9
gradient_preservation_weight: 0.22
metallic_classification_weight: 0.08
material_context_weight: 0.03
residual_safety_weight: 0.26
residual_safety_margin: 0.03

validation_progress_milestones: 40
render_proxy_validation_milestone_interval: 5
render_proxy_validation_max_batches: 6
save_only_best_checkpoint: true
keep_last_checkpoints: 4

tracker_run_name: material-refine-paper-stage1-round11c-r8-mid-guard-compatible
tracker_group: paper-stage1-r8
tracker_tags: material-refine,paper,stage1,round11c,r8,mid-guard,shape-compatible
seed: 20260425
