# Resume-only overlay for Round10 R-8 full training.
#
# Use together with:
#   --config configs/material_refine_train_paper_stage1_round10_r8_full.yaml
#   --config configs/material_refine_train_paper_stage1_round10_r8_full_resume_latest.yaml
#
# The base config initializes from Round9. This overlay clears model-only
# initialization and restores the full optimizer/scheduler state from Round10.

init_from_checkpoint: null
resume: output/material_refine_paper/stage1_round10_r8_full/latest.pt
output_dir: output/material_refine_paper/stage1_round10_r8_full

tracker_run_name: material-refine-paper-stage1-round10-r8-full
wandb_resume_id: uvvbng5r
wandb_resume_mode: allow

# Keep the original paper-stage schedule. The checkpoint resumes from epoch 50,
# so only the tail end should run after the CUDA scatter synchronization fix.
epochs: 52
save_only_best_checkpoint: true
keep_last_checkpoints: 4
