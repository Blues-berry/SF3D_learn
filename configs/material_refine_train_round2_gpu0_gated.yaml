# Round2 GPU0 preset. It is safe for a growing manifest because training data
# reloads each epoch, while the validation split is frozen on first launch.

manifest: output/material_refine_pipeline_20260418T091559Z/prepared/full/canonical_manifest_full.json
train_manifest: output/material_refine_pipeline_20260418T091559Z/prepared/full/canonical_manifest_full.json
val_manifest: output/material_refine_pipeline_20260418T091559Z/prepared/full/canonical_manifest_full.json

train_split: train
val_split: val
split_strategy: hash
hash_val_ratio: 0.10
hash_test_ratio: 0.10
freeze_val_manifest_to: frozen_val_manifest.json
reload_manifest_every: 1
allow_empty_val: false

epochs: 24
max_train_steps: 0
batch_size: 8
num_workers: 8
grad_accumulation_steps: 2
drop_last: false

optimizer: adamw
learning_rate: 2.0e-4
min_learning_rate: 2.0e-5
weight_decay: 1.0e-2
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
adam_amsgrad: false
lr_scheduler: plateau
warmup_steps: 160
plateau_factor: 0.5
plateau_patience: 3
plateau_threshold: 1.0e-3
grad_clip_norm: 1.0

atlas_size: 512
buffer_resolution: 256
amp_dtype: bfloat16
cuda_device_index: 0
matmul_precision: high
allow_tf32: true

train_balance_mode: source_x_prior
train_balance_power: 1.0
train_samples_per_epoch: 0
prior_dropout_prob: 0.05
prior_dropout_start_prob: 0.05
prior_dropout_end_prob: 0.35
prior_dropout_warmup_epochs: 8

refine_weight: 1.0
coarse_weight: 0.40
prior_consistency_weight: 0.08
smoothness_weight: 0.015
view_consistency_weight: 0.15

eval_every: 1
validation_steps: 0
save_every: 1
checkpointing_steps: 0
save_only_best_checkpoint: false
keep_last_checkpoints: 8
log_every: 20
val_preview_samples: 8
early_stopping_patience: 6
early_stopping_min_delta: 1.0e-5

output_dir: output/material_refine_pipeline_20260418T091559Z/train_round2_gpu0_gated
report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_run_name: material-refine-round2-gpu0-gated
tracker_group: material-refine-round2
tracker_tags: material-refine,sf3d,round2,gpu0,gated
wandb_mode: online
wandb_log_artifacts: true
wandb_watch: false
export_training_curves: true
preflight_audit_records: -1
target_prior_identity_warning_threshold: 0.95
fail_on_target_prior_identity: true
seed: 43
