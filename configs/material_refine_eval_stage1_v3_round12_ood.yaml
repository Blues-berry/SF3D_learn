# Round12 Stage1-v3 OOD diagnostic evaluation.
#
# Includes smoke_only rows because this manifest is eval-only. Results must be
# reported as OOD/diagnostic, not as paper-stage main-table evidence.

manifest: output/material_refine_paper/stage1_v3_dataset_latest/stage1_v3_ood_eval_manifest.json
checkpoint: output/material_refine_paper/stage1_v3_round12_balanced_data_adaptation/best.pt
output_dir: output/material_refine_paper/stage1_v3_round12_balanced_data_adaptation_eval_ood

split: test
split_strategy: manifest
paper_splits: paper_test_ood_object
target_quality_tiers: paper_strong,paper_pseudo,smoke_only

batch_size: 1
num_workers: 4
view_sample_count: 0
min_hard_views: 0
log_every: 5
cuda_device_index: 1
max_samples:

eval_variant: ours_full
render_metric_mode: proxy_uv_shading
max_artifact_objects: 24
enable_lpips: true
diagnostic_min_group_count: 16
skip_report: false
print_summary_json: false

report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_run_name: material-refine-stage1-v3-round12-ood-diagnostic
tracker_group: stage1-v3-data-adaptation
tracker_tags: material-refine,stage1-v3,round12,ood,diagnostic-only,no-prior,not-paper-full
wandb_mode: online
wandb_max_rows: 128
wandb_log_top_cases: false
wandb_log_group_breakdowns: true
wandb_log_artifacts: true
wandb_artifact_policy: summary
