# Round11 / R-8 boundary-render guard overlay.
#
# Use with the Round10 full R base config:
#   --config configs/material_refine_train_paper_stage1_round10_r8_full.yaml
#   --config configs/material_refine_train_paper_stage1_round11_r8_boundary_render_guard.yaml
#
# Motivation from Round10 full-test:
#   UV RM MAE and PSNR improved, but SSIM/LPIPS, boundary bleed, and RM gradient
#   preservation regressed. This round keeps the A-H architecture but adds hard
#   residual safety caps and stronger boundary/render guards.

output_dir: output/material_refine_paper/stage1_round11_r8_boundary_render_guard
init_from_checkpoint: output/material_refine_paper/stage1_round10_r8_full/best.pt
resume:

epochs: 16
learning_rate: 3.0e-5
min_learning_rate: 3.0e-6
warmup_steps: 120
plateau_patience: 3
early_stopping_patience: 6

# Conservative residual policy. Round10 changed too much of the atlas and
# improved UV while damaging structure/perception metrics.
residual_gate_bias: -1.75
min_residual_gate: 0.01
max_residual_gate: 0.42
prior_confidence_gate_strength: 0.72
uncertainty_gate_strength: 0.35

# Boundary/render guards.
enable_boundary_safety_module: true
boundary_safety_strength: 0.65
boundary_residual_suppression_strength: 0.65
enable_render_consistency_gate: true
render_gate_strength: 0.35
enable_inverse_material_check: true
inverse_check_strength: 0.45

# Keep topology as a paper method component, but make it lighter after Round10
# showed strong gradient preservation regression.
enable_material_topology_reasoning: true
topology_feature_channels: 8
topology_patch_size: 16
topology_layers: 1
topology_heads: 1

# Loss policy: less pure UV chasing, more boundary/gradient/view safety.
refine_weight: 0.66
coarse_weight: 0.25
prior_consistency_weight: 0.24
smoothness_weight: 8.0e-4
view_consistency_weight: 0.42
edge_aware_weight: 0.18
boundary_bleed_weight: 0.22
boundary_band_kernel: 9
gradient_preservation_weight: 0.32
metallic_classification_weight: 0.08
material_context_weight: 0.03
residual_safety_weight: 0.35
residual_safety_margin: 0.025

validation_progress_milestones: 40
render_proxy_validation_milestone_interval: 5
render_proxy_validation_max_batches: 6
save_only_best_checkpoint: true
keep_last_checkpoints: 4

tracker_run_name: material-refine-paper-stage1-round11-r8-boundary-render-guard
tracker_group: paper-stage1-r8
tracker_tags: material-refine,paper,stage1,round11,r8,boundary-guard,render-guard,gradient-safe
seed: 20260425
