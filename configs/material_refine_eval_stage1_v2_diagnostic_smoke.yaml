# Stage1-v2 diagnostic-only eval smoke.
# This is not a paper-stage result; it checks loader/eval readiness for diverse/metal records.

manifest: output/material_refine_paper/stage1_v2_dataset_20260422/stage1_v2_diverse_diagnostic_manifest.json
# Round8 failed promotion gates; keep diagnostic smoke aligned with the Round9 init baseline.
checkpoint: output/material_refine_paper/stage1_round7_gradient_guard/best.pt
output_dir: output/material_refine_paper/stage1_v2_dataset_20260422/diagnostic_eval_smoke

split: test
split_strategy: manifest
batch_size: 1
num_workers: 4
view_sample_count: 8
min_hard_views: 0
log_every: 5
cuda_device_index: 1
max_samples: 32

eval_variant: diagnostic_only
render_metric_mode: proxy_uv_shading
max_artifact_objects: 12
enable_lpips: false
diagnostic_min_group_count: 8
skip_report: false
print_summary_json: false

report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_run_name: material-refine-stage1-v2-diagnostic-smoke
tracker_group: paper-stage1-diagnostic
tracker_tags: material-refine,stage1-v2,diagnostic-only,loader-smoke
wandb_mode: online
wandb_max_rows: 32
wandb_log_top_cases: false
wandb_log_group_breakdowns: true
wandb_log_artifacts: true
wandb_artifact_policy: summary
