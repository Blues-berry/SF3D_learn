# Method-level config for lightweight roughness/metallic material refinement.

epochs: 40
max_train_steps: 0
batch_size: 4
num_workers: 4
grad_accumulation_steps: 2
learning_rate: 2.0e-4
min_learning_rate: 2.0e-5
weight_decay: 1.0e-2
optimizer: adamw
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
adam_amsgrad: false
lr_scheduler: plateau
warmup_steps: 250
plateau_factor: 0.5
plateau_patience: 3
plateau_threshold: 1.0e-3
grad_clip_norm: 1.0

amp_dtype: bfloat16
cuda_device_index: 1
matmul_precision: high
allow_tf32: true

refine_weight: 1.0
coarse_weight: 0.35
prior_consistency_weight: 0.10
smoothness_weight: 0.02
view_consistency_weight: 0.15
prior_dropout_prob: 0.25

eval_every: 1
validation_steps: 0
save_every: 1
checkpointing_steps: 0
save_only_best_checkpoint: false
keep_last_checkpoints: 3
log_every: 20
val_preview_samples: 4
early_stopping_patience: 8
early_stopping_min_delta: 1.0e-4

report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_group: material-refine
tracker_tags: material-refine,sf3d,ng-style,rm-refine
wandb_mode: offline
wandb_log_artifacts: true
wandb_watch: false
export_training_curves: true
preflight_audit_records: 256
target_prior_identity_warning_threshold: 0.95
seed: 42
