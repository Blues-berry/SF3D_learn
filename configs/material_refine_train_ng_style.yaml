# Material refinement training config.
# This single-file preset mirrors the split configs:
#   --method-config configs/material_refine_method_rm_refine.yaml
#   --data-config configs/material_refine_data_partial.yaml

manifest: output/material_refine_pipeline_20260418T091559Z/prepared/full/canonical_manifest_partial.json
train_manifest: output/material_refine_pipeline_20260418T091559Z/prepared/full/canonical_manifest_partial.json
val_manifest: output/material_refine_pipeline_20260418T091559Z/prepared/full/canonical_manifest_partial.json
freeze_val_manifest_to: output/material_refine_pipeline_20260418T091559Z/prepared/full/frozen_val_manifest.json

train_split: train
val_split: val
split_strategy: auto
hash_val_ratio: 0.1
hash_test_ratio: 0.1
reload_manifest_every: 1
allow_empty_val: true

epochs: 40
max_train_steps: 0
batch_size: 4
num_workers: 4
grad_accumulation_steps: 2
learning_rate: 2.0e-4
min_learning_rate: 2.0e-5
weight_decay: 1.0e-2
optimizer: adamw
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
adam_amsgrad: false
lr_scheduler: plateau
warmup_steps: 250
plateau_factor: 0.5
plateau_patience: 3
plateau_threshold: 1.0e-3
grad_clip_norm: 1.0

atlas_size: 512
buffer_resolution: 256
amp_dtype: bfloat16
cuda_device_index: 1
matmul_precision: high
allow_tf32: true

train_balance_mode: source_x_prior
train_balance_power: 1.0
train_samples_per_epoch: 0
prior_dropout_prob: 0.25

refine_weight: 1.0
coarse_weight: 0.35
prior_consistency_weight: 0.10
smoothness_weight: 0.02
view_consistency_weight: 0.0
view_consistency_mode: disabled

eval_every: 1
validation_steps: 0
save_every: 1
checkpointing_steps: 0
save_only_best_checkpoint: false
keep_last_checkpoints: 3
log_every: 20
progress_bar: true
progress_bar_leave: false
progress_bar_mininterval: 0.5
train_line_logs: false
val_preview_samples: 4
early_stopping_patience: 8
early_stopping_min_delta: 1.0e-4

output_dir: output/material_refine_train_ng_style
report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_group: material-refine
tracker_tags: material-refine,sf3d,ng-style
wandb_mode: offline
wandb_log_artifacts: true
wandb_watch: false
export_training_curves: true
terminal_json_logs: false
startup_probe_batches: 2
startup_probe_device_transfer: true
dataset_distribution_topk: 8
preflight_audit_records: 256
target_prior_identity_warning_threshold: 0.95
max_target_prior_identity_rate_for_paper: 0.30
min_nontrivial_target_count_for_paper: 128
seed: 42
