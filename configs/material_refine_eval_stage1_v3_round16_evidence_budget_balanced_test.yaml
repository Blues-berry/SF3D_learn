# Round16 eval-only structural gate: evidence update budget on top of Round15.

manifest: output/material_refine_paper/stage1_v3_dataset_latest/stage1_v3_balanced_paper_manifest.json
checkpoint: output/material_refine_paper/stage1_v3_round15_material_evidence_calibration/best.pt
output_dir: output/material_refine_paper/stage1_v3_round16_evidence_update_budget_eval_balanced_test

split: test
split_strategy: manifest
paper_splits: paper_test_iid,paper_test_material_holdout
target_quality_tiers: paper_strong,paper_pseudo
supervision_roles: paper_main

batch_size: 2
num_workers: 6
view_sample_count: 16
min_hard_views: 4
log_every: 5
cuda_device_index: 1
max_samples:

eval_variant: ours_full
render_metric_mode: proxy_uv_shading
max_artifact_objects: 12
enable_lpips: true
diagnostic_min_group_count: 16
skip_report: false
print_summary_json: false

enable_evidence_update_budget: true
evidence_update_budget_strength: 0.72
evidence_update_budget_floor: 0.04

report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_run_name: material-refine-stage1-v3-round16-evidence-budget-balanced-test
tracker_group: stage1-v3-method-iteration
tracker_tags: material-refine,stage1-v3,round16,evidence-update-budget,balanced-test,eval-only
wandb_mode: online
wandb_max_rows: 128
wandb_log_top_cases: false
wandb_log_group_breakdowns: true
wandb_log_artifacts: true
wandb_artifact_policy: summary
