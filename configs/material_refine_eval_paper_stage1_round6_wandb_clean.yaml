# Round6 clean-W&B full-test evaluation preset.

manifest: output/material_refine_paper/latest_dataset_check_20260421/stage1_subset_merged490/paper_stage1_subset_manifest.json
checkpoint: output/material_refine_paper/stage1_round6_wandb_clean/best.pt
output_dir: output/material_refine_paper/stage1_round6_wandb_clean_eval

split: test
split_strategy: manifest
paper_splits: paper_test_iid,paper_test_material_holdout
target_quality_tiers: paper_strong,paper_pseudo

batch_size: 1
num_workers: 4
view_sample_count: 0
min_hard_views: 0
log_every: 5
cuda_device_index: 1
max_samples:

eval_variant: ours_full
render_metric_mode: proxy_uv_shading
max_artifact_objects: 24
enable_lpips: true
diagnostic_min_group_count: 16
skip_report: false

report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_run_name: material-refine-paper-stage1-round6-wandb-clean-full-test
tracker_group: paper-stage1-metric-upgrade
tracker_tags: material-refine,round6,wandb-clean,metric-upgrade,full-test
wandb_mode: online
wandb_max_rows: 128
wandb_log_top_cases: false
wandb_log_group_breakdowns: true
wandb_log_artifacts: true
wandb_artifact_policy: summary
