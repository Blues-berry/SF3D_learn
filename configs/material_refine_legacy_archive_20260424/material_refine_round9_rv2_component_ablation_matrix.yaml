# Round9 R-v2 component ablation matrix.
# This isolates the boundary-aware, material-aware, and render-consistency-aware
# additions before promoting any full paper-stage training run.

base_config: configs/material_refine_train_paper_stage1_round9_boundary_render_gate.yaml
default_smoke_overrides:
  epochs: 3
  max_train_steps: 45
  max_train_records: 96
  max_val_records: 40
  report_to: wandb
  tracker_group: paper-stage1-round9-rv2-component-ablation
  wandb_artifact_policy: best
  save_only_best_checkpoint: true

selection_rule:
  primary: minimize validation uv_total while preserving render_proxy/view_rm_mae_delta and proxy_rm_psnr_delta
  secondary: minimize val/loss/boundary_bleed and val/residual_gate/regression_rate
  diagnostic: compare val/loss/material_context and material-family heldout behavior when Stage1-v2 strict data becomes diverse
  note: full Round9 R-v2 training is allowed only after smoke ablations and diagnostic-only OOD eval are reviewed

variants:
  - name: rv2_full
    output_dir: output/material_refine_paper/round9_rv2_component_ablation/rv2_full
    tracker_run_name: material-refine-round9-rv2-full
  - name: rv2_no_boundary_context
    enable_boundary_context: false
    boundary_context_strength: 0.0
    output_dir: output/material_refine_paper/round9_rv2_component_ablation/rv2_no_boundary_context
    tracker_run_name: material-refine-round9-rv2-no-boundary-context
  - name: rv2_no_material_context
    enable_material_context: false
    material_context_weight: 0.0
    material_delta_scale: 0.0
    output_dir: output/material_refine_paper/round9_rv2_component_ablation/rv2_no_material_context
    tracker_run_name: material-refine-round9-rv2-no-material-context
  - name: rv2_no_render_gate
    enable_render_consistency_gate: false
    render_gate_strength: 0.0
    output_dir: output/material_refine_paper/round9_rv2_component_ablation/rv2_no_render_gate
    tracker_run_name: material-refine-round9-rv2-no-render-gate
  - name: rv2_safe_low_delta
    material_delta_scale: 0.03
    boundary_context_strength: 0.20
    render_gate_strength: 0.40
    residual_safety_weight: 0.24
    output_dir: output/material_refine_paper/round9_rv2_component_ablation/rv2_safe_low_delta
    tracker_run_name: material-refine-round9-rv2-safe-low-delta
