# Round13 guard ablation matrix.
#
# This isolates the new evidence-safety gates that target the Round12 failure:
# UV RM improved, but view/render/boundary metrics regressed on the balanced test.

base_config: configs/material_refine_train_stage1_v3_round13_view_render_boundary_guard.yaml
default_smoke_overrides:
  epochs: 2
  max_train_steps: 40
  max_train_records: 128
  max_val_records: 64
  report_to: wandb
  tracker_group: stage1-v3-round13-guard-ablation
  wandb_artifact_policy: best
  save_only_best_checkpoint: true
  early_stopping_patience: 2

selection_rule:
  primary: preserve or improve validation view_rm_mae / proxy PSNR / proxy SSIM while keeping UV RM close to Round12
  secondary: reduce boundary_bleed_score and prior_residual_safety regression_rate
  note: promote only variants without metric_disagreement on balanced heldout

variants:
  - name: guard_full
    output_dir: output/material_refine_paper/round13_guard_ablation/guard_full
    tracker_run_name: material-refine-round13-guard-full
  - name: no_view_uncertainty_gate
    view_uncertainty_residual_suppression_strength: 0.0
    output_dir: output/material_refine_paper/round13_guard_ablation/no_view_uncertainty_gate
    tracker_run_name: material-refine-round13-no-view-uncertainty-gate
  - name: no_bleed_risk_gate
    bleed_risk_residual_suppression_strength: 0.0
    output_dir: output/material_refine_paper/round13_guard_ablation/no_bleed_risk_gate
    tracker_run_name: material-refine-round13-no-bleed-risk-gate
  - name: render_gate_light
    render_gate_strength: 0.32
    inverse_check_strength: 0.32
    output_dir: output/material_refine_paper/round13_guard_ablation/render_gate_light
    tracker_run_name: material-refine-round13-render-gate-light
  - name: residual_extra_safe
    max_residual_gate: 0.30
    residual_gate_bias: -2.05
    prior_confidence_gate_strength: 0.74
    output_dir: output/material_refine_paper/round13_guard_ablation/residual_extra_safe
    tracker_run_name: material-refine-round13-residual-extra-safe
