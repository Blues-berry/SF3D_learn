# Round15 Stage1-v3 OOD diagnostic evaluation.

manifest: output/material_refine_paper/stage1_v3_dataset_latest/stage1_v3_ood_eval_manifest.json
checkpoint: output/material_refine_paper/stage1_v3_round15_material_evidence_calibration/best.pt
output_dir: output/material_refine_paper/stage1_v3_round15_material_evidence_calibration_eval_ood

split: test
split_strategy: manifest
paper_splits: paper_test_ood_object
target_quality_tiers: paper_strong,paper_pseudo,smoke_only,research_only
supervision_roles: paper_main,diagnostic_only

batch_size: 1
num_workers: 4
view_sample_count: 16
min_hard_views: 4
log_every: 5
cuda_device_index: 1
max_samples:

eval_variant: ours_full
render_metric_mode: proxy_uv_shading
max_artifact_objects: 12
enable_lpips: true
diagnostic_min_group_count: 8
skip_report: false
print_summary_json: false

report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_run_name: material-refine-stage1-v3-round15-ood
tracker_group: stage1-v3-method-iteration
tracker_tags: material-refine,stage1-v3,round15,ood,material-evidence-calibration,diagnostic-only
wandb_mode: online
wandb_max_rows: 128
wandb_log_top_cases: false
wandb_log_group_breakdowns: true
wandb_log_artifacts: true
wandb_artifact_policy: summary
