# Paper Stage-1 main training preset.
#
# Goal:
#   Train the generator-agnostic RM refiner on canonical UV/view buffers with
#   strict leakage gates and generator/prior-balanced sampling. This preset is
#   intended for paper-quality runs after the data process provides non-trivial
#   roughness/metallic targets.

manifest: output/material_refine_paper/paper_stage1_pipeline/readiness/stage1_subset/paper_stage1_subset_manifest.json
train_manifest: output/material_refine_paper/paper_stage1_pipeline/readiness/stage1_subset/paper_stage1_subset_manifest.json
val_manifest: output/material_refine_paper/paper_stage1_pipeline/readiness/stage1_subset/paper_stage1_subset_manifest.json

train_split: train
val_split: val
split_strategy: manifest
hash_val_ratio: 0.10
hash_test_ratio: 0.10
freeze_val_manifest_to: paper_stage1_frozen_val_manifest.json
reload_manifest_every: 1
allow_empty_val: false

# Leave generator filters unset for the cross-generator main experiment.
# For source-specific ablations, override with e.g. `--train-generator-ids sf3d`.
train_generator_ids: null
val_generator_ids: null
train_supervision_roles: paper_main
val_supervision_roles: paper_main
train_target_quality_tiers: paper_strong,paper_pseudo
val_target_quality_tiers: paper_strong,paper_pseudo
train_paper_splits: paper_train
val_paper_splits: paper_val_iid

epochs: 60
max_train_steps: 0
batch_size: 4
val_batch_size: 4
num_workers: 4
grad_accumulation_steps: 4
drop_last: false

optimizer: adamw
learning_rate: 2.0e-4
min_learning_rate: 1.0e-5
weight_decay: 1.0e-2
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
adam_amsgrad: false
lr_scheduler: plateau
warmup_steps: 500
plateau_factor: 0.5
plateau_patience: 5
plateau_threshold: 5.0e-4
grad_clip_norm: 1.0

atlas_size: 512
buffer_resolution: 256
train_view_sample_count: 8
train_min_hard_views: 3
train_randomize_view_subset: true
val_view_sample_count: 12
val_min_hard_views: 3
val_balance_key: material_family
val_records_per_balance_group: 64
val_expected_balance_groups: metal_dominant,ceramic_glossy,glass_metal,mixed_thin_boundary,glossy_non_metal
amp_dtype: bfloat16
cuda_device_index: 0
matmul_precision: high
allow_tf32: true

train_balance_mode: generator_x_prior
train_balance_power: 1.0
train_samples_per_epoch: 0
train_target_quality_weights: paper_strong=1.8,paper_pseudo=1.0,research_only=0.4,smoke_only=0.0
train_failure_tag_metadata_key: failure_tags
train_failure_tag_weights: metal_nonmetal_confusion=3.0,boundary_bleed=2.5,local_highlight_misread=2.5
prior_dropout_prob: 0.05
prior_dropout_start_prob: 0.05
prior_dropout_end_prob: 0.40
prior_dropout_warmup_epochs: 12

refine_weight: 1.0
coarse_weight: 0.45
prior_consistency_weight: 0.06
smoothness_weight: 0.012
view_consistency_weight: 0.0
view_consistency_mode: disabled

eval_every: 1
validation_steps: 0
validation_progress_milestones: 40
max_validation_batches: 0
save_every: 1
checkpointing_steps: 0
save_only_best_checkpoint: false
keep_last_checkpoints: 10
log_every: 1
progress_bar: true
progress_bar_leave: false
progress_bar_mininterval: 0.5
train_line_logs: false
val_preview_samples: 12
wandb_val_preview_max: 8
wandb_log_preview_grid: false
save_preview_contact_sheet: false
early_stopping_patience: 10
early_stopping_min_delta: 1.0e-5

output_dir: output/material_refine_paper/stage1_main
report_to: wandb
tracker_project_name: stable-fast-3d-material-refine
tracker_run_name: material-refine-paper-stage1-main
tracker_group: paper-stage1
tracker_tags: material-refine,paper,stage1,cross-generator,main
wandb_mode: offline
wandb_log_artifacts: true
wandb_watch: false
export_training_curves: true
terminal_json_logs: false
startup_probe_batches: 2
startup_probe_device_transfer: true
dataset_distribution_topk: 8
preflight_audit_records: -1
target_prior_identity_warning_threshold: 0.20
max_target_prior_identity_rate_for_paper: 0.30
min_nontrivial_target_count_for_paper: 128
fail_on_target_prior_identity: true
seed: 20260419
